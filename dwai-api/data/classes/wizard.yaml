name: Wizard
description: Dungeon World has rules. Not the laws of men or the rule of some petty
  tyrant. Bigger, better rules. You drop something—it falls. You can't make something
  out of nothing. The dead stay dead, right? Oh, the things we tell ourselves to feel
  better about the long, dark nights. You've spent so very long poring over those
  tomes of yours. The experiments that nearly drove you mad and all the botched summonings
  that endangered your very soul. For what? For power. What else is there? Not just
  the power of King or Country but the power to boil a man's blood in his veins. To
  call on the thunder of the sky and the churn of the roiling earth. To shrug off
  the rules the world holds so dear. Let them cast their sidelong glances. Let them
  call you "warlock" or "diabolist." Who among them can hurl fireballs from their
  eyes? Yeah. We didn't think so.
hp_base: 4
damage_die: 4
names:
  elf: [Galadiir, Fenfaril, Lilliastre, Phirosalle, Enkirash, Halwyr]
  human: [Avon, Morgan, Rath, Ysolde, Ovid, Vitus, Aldara, Xeno, Uri]
looks:
  eyes: [Haunted Eyes, Sharp Eyes, Crazy Eyes]
  hair: [Styled Hair, Wild Hair, Pointed Hat]
  clothing: [Worn Robes, Stylish Robes, Strange Robes]
  body: [Pudgy Body, Creepy Body, Thin Body]
race_moves:
  - key: elf_wizard
    name: Elf
    type: class
    description: Magic is as natural as breath to you. Detect Magic is a cantrip for you.
  - key: human_wizard
    name: Human
    type: class
    description: Choose one cleric spell. You can cast it as if it was a wizard spell.
starting_moves:
  - key: spellbook
    name: Spellbook
    type: class
    description:
      You have mastered several spells and inscribed them in your spellbook.
      You start out with three first level spells in your spellbook as well as the
      cantrips. Whenever you gain a level, you add a new spell of your level or lower
      to your spellbook. Your spellbook is 1 weight.
  - key: prepare_spells
    name: Prepare Spells
    type: class
    trigger: When you spend uninterrupted time (an hour or so) in quiet contemplation of your spellbook
    description: You perform all of the following.
    options:
      - Lose any spells you already have prepared
      - Prepare new spells of your choice from your spellbook whose total levels don't exceed your own level+1.
      - Prepare your cantrips which never count against your limit.
  - key: cast_a_spell_wizard
    name: Cast a Spell (Int)
    type: class
    trigger: When you release a spell you've prepared
    roll: INT
    on_10: The spell is successfully cast and you do not forget the spell—you may cast it again later.
    on_7_9: The spell is cast, but choose one.
    description: Note that maintaining spells with ongoing effects will sometimes cause a penalty to your roll to cast a spell.
    options:
      - You draw unwelcome attention or put yourself in a spot. The GM will tell you how.
      - The spell disturbs the fabric of reality as it is cast—take -1 ongoing to cast a spell until the next time you Prepare Spells.
      - After it is cast, the spell is forgotten. You cannot cast the spell again until you prepare spells.
  - key: spell_defense
    name: Spell Defense
    type: class
    trigger: When an ongoing spell you maintain would end
    description:
      You may end any ongoing spell immediately and use the energy of its
      dissipation to deflect an oncoming attack. The spell ends and you subtract its
      level from the damage done to you.
  - key: ritual
    name: Ritual
    type: class
    trigger: When you draw on a place of power to create a magical effect
    description:
      Tell the GM what you're trying to achieve. Ritual effects are always
      possible, but the GM will give you one to four of the following conditions.
    options:
      - It's going to take days/weeks/months
      - First you must ____
      - You'll need help from ____
      - It will require a lot of money
      - The best you can do is a lesser version, unreliable and limited
      - You and your allies will risk danger from ____
      - You'll have to disenchant ____ to do it
alignments:
  - alignment: Good
    description: Use magic to directly aid another.
  - alignment: Neutral
    description: Discover something about a magical mystery.
  - alignment: Evil
    description: Use magic to cause terror and fear.
starting_gear:
  load_base: 7
  default:
    - Spellbook
    - dungeon_rations
  options:
    - pick: 1
      choices:
        - items:
            - leather_armor
        - items:
            - bag_of_books
            - healing_potion
            - healing_potion
            - healing_potion
        - items:
            - dagger
        - items:
            - staff
        - items:
            - healing_potion
        - items:
            - antitoxin
            - antitoxin
            - antitoxin
bonds:
  - _______________ will play an important role in the events to come. I have foreseen it!
  - _______________ is keeping an important secret from me.
  - _______________ is woefully misinformed about the world; I will teach them all that I can.
advanced_moves_2_5:
  - key: prodigy
    name: Prodigy
    type: class
    description: Choose a spell. You prepare that spell as if it were one level lower.
  - key: empowered_magic
    name: Empowered Magic
    type: class
    trigger: When you cast a spell on a 10+
    description: You have the option of choosing from the 7-9 list. If you do, you may choose one of these as well.
    options:
      - The spell's effects are maximized
      - The spell's targets are doubled
  - key: fount_of_knowledge
    name: Fount of Knowledge
    type: class
    trigger: When you spout lore about something no one else has any clue about
    description: Take +1.
  - key: know_it_all
    name: Know-It-All
    type: class
    trigger: When another player's character comes to you for advice and you tell them what you think is best
    description: They get +1 forward when following your advice and you mark experience if they do.
  - key: expanded_spellbook
    name: Expanded Spellbook
    type: class
    description: Add a new spell from the spell list of any class to your spellbook.
  - key: enchanter
    name: Enchanter
    type: class
    trigger: When you have time and safety with a magic item
    description: You may ask the GM what it does, the GM will answer you truthfully.
  - key: logical
    name: Logical
    type: class
    trigger: When you use strict deduction to analyze your surroundings
    description: You can discern realities with INT instead of WIS.
  - key: arcane_ward
    name: Arcane Ward
    type: class
    trigger: As long as you have at least one prepared spell of first level or higher
    description: You have +2 armor.
  - key: counterspell
    name: Counterspell
    type: class
    trigger: When you attempt to counter an arcane spell that will otherwise affect you
    roll: INT
    on_10: The spell is countered and has no effect on you.
    on_7_9: The spell is countered and you forget the spell you staked.
    description:
      Stake one of your prepared spells on the defense. Your counterspell
      protects only you; if the countered spell has other targets they get its effects.
  - key: quick_study
    name: Quick Study
    type: class
    trigger: When you see the effects of an arcane spell
    description: Ask the GM the name of the spell and its effects. You take +1 when acting on the answers.
advanced_moves_6_10:
  - key: master_wizard
    name: Master
    type: class
    description: Choose one spell in addition to the one you picked for prodigy. You prepare that spell as if it were one level lower.
    requires: prodigy
  - key: greater_empowered_magic
    name: Greater Empowered Magic
    type: class
    trigger: When you cast a spell
    description:
      On a 10-11 you have the option of choosing from the 7-9 list. If you
      do, you may choose one of these effects as well. On a 12+ you get to choose
      one of these effects for free.
    replaces: empowered_magic
    options:
      - The spell's effects are doubled
      - The spell's targets are doubled
  - key: enchanters_soul
    name: Enchanter's Soul
    type: class
    trigger: When you have time and safety with a magic item in a place of power
    description:
      You can empower that item so that the next time you use it its effects
      are amplified, the GM will tell you exactly how.
    requires: enchanter
  - key: highly_logical
    name: Highly Logical
    type: class
    trigger: When you use strict deduction to analyze your surroundings
    description:
      You can discern realities with Int instead of Wis. On a 12+ you get
      to ask the GM any three questions, not limited by the list.
    replaces: logical
  - key: arcane_armor
    name: Arcane Armor
    type: class
    trigger: As long as you have at least one prepared spell of first level or higher
    description: You have +4 armor.
    replaces: arcane_ward
  - key: protective_counter
    name: Protective Counter
    type: class
    trigger: When an ally within sight of you is affected by an arcane spell
    description:
      You can counter it as if it affected you. If the spell affects multiple
      allies you must counter for each ally separately.
    requires: counterspell
  - key: ethereal_tether
    name: Ethereal Tether
    type: class
    trigger: When you have time with a willing or helpless subject
    description:
      You can craft an ethereal tether with them. You perceive what they
      perceive and can discern realities about someone tethered to you or their
      surroundings no matter the distance. Someone willingly tethered to you can
      communicate with you over the tether as if you were in the room with them.
  - key: mystical_puppet_strings
    name: Mystical Puppet Strings
    type: class
    trigger: When you use magic to control a person's actions
    description: They have no memory of what you had them do and bear you no ill will.
  - key: spell_augmentation
    name: Spell Augmentation
    type: class
    trigger: When you deal damage to a creature
    description:
      You can shunt a spell's energy into them—end one of your ongoing spells
      and add the spell's level to the damage dealt.
  - key: self_powered
    name: Self-Powered
    type: class
    trigger: When you have time, arcane materials, and a safe space
    description:
      You can create your own place of power. Describe to the GM what kind
      of power it is and how you're binding it to this place, the GM will tell you
      one kind of creature that will have an interest in your workings.
