name: Bard
description: The poems say an adventurer's life is all open roads and the glory of
  coin and combat. The tales told in every farmhand-filled inn have to have some ring
  of truth to them, don't they? The songs to inspire peasantry and royals alike—to
  soothe the savage beast or drive men to a frenzy—have to come from somewhere. Enter
  the bard. You, with your smooth tongue and quick wit. You teller-of-tales and singer-of-songs.
  It takes a mere minstrel to retell a thing but a true bard to live it. Strap on
  your boots, noble orator. Sharpen that hidden dagger and take up the call. Someone's
  got to be there, fighting shoulder-to-shoulder with the goons and the thugs and
  the soon-to-be-heroes. Who better than you to write the tale of your own heroism?
  Nobody. Get going.
hp_base: 6
damage_die: 6
names:
  elf: [Astrafel, Daelwyn, Feliana, Damarra, Sistranalle, Pendrell, Melliandre, Dagoliir]
  human: [Baldric, Leena, Dunwick, Willem, Edwyn, Florian, Seraphine, Quorra, Charlotte, Lily, Ramonde, Cassandra]
looks:
  eyes: [Knowing Eyes, Fiery Eyes, Joyous Eyes]
  hair: [Fancy Hair, Wild Hair, Stylish Cap]
  clothing: [Finery, Traveling Clothes, Poor Clothes]
  body: [Fit Body, Well-fed Body, Thin Body]
race_moves:
- name: Elf
  description: When you enter an important location (your call) you can ask the GM
    for one fact from the history of that location.
- name: Human
  description: When you first enter a civilized settlement someone who respects the
    custom of hospitality to minstrels will take you in as their guest.
starting_moves:
- name: Arcane Art
  description: 'When you weave a performance into a basic spell, choose an ally and
    an effect: Then roll+Cha. ✴On a 10+, the ally gets the selected effect. ✴On a
    7-9, your spell still works, but you draw unwanted attention or your magic reverberates
    to other targets affecting them as well, GM''s choice.'
  options:
  - Heal 1d8 damage
  - +1d4 forward to damage
  - Their mind is shaken clear of one enchantment
  - The next time someone successfully assists the target with aid, they get +2 instead
    of +1
- name: Bardic Lore
  description: 'Choose an area of expertise: When you first encounter an important
    creature, location, or item (your call) covered by your bardic lore you can ask
    the GM any one question about it; the GM will answer truthfully. The GM may then
    ask you what tale, song, or legend you heard that information in.'
  options:
  - Spells and Magicks
  - The Dead and Undead
  - Grand Histories of the Known World
  - A Bestiary of Creatures Unusual
  - The Planar Spheres
  - Legends of Heroes Past
  - Gods and Their Servants
- name: Charming and Open
  description: When you speak frankly with someone, you can ask their player a question
    from the list below. They must answer it truthfully, then they may ask you a question
    from the list (which you must answer truthfully).
  options:
  - Whom do you serve?
  - What do you wish I would do?
  - How can I get you to ______?
  - What are you really feeling right now?
  - What do you most desire?
- name: A Port in the Storm
  description: When you return to a civilized settlement you've visited before, tell
    the GM when you were last here. They'll tell you how it's changed since then.
alignments:
- alignment: Good
  description: Perform your art to aid someone else.
- alignment: Neutral
  description: Avoid a conflict or defuse a tense situation.
- alignment: Chaotic
  description: Spur others to significant and unplanned decisive action.
starting_gear:
  load_base: 9
  default:
    - Dungeon rations (5 uses, 1 weight)
  options:
  - Your father's mandolin, repaired (0 weight)
  - A fine lute, a gift from a noble (0 weight)
  - The pipes with which you courted your first love (0 weight)
  - A stolen horn (0 weight)
  - A fiddle, never before played (0 weight)
  - A songbook in a forgotten tongue (0 weight)
  - Leather armor (1 armor, 1 weight)
  - Ostentatious clothes (0 weight)
  - Dueling rapier (close, precise, 2 weight)
  - Worn bow (near, 2 weight), bundle of arrows (3 ammo, 1 weight), and short sword (close, 1 weight)
  - Adventuring gear (1 weight)
  - Bandages (0 weight)
  - Halfling pipeleaf (0 weight)
  - 3 coins
bonds:
- This is not my first adventure with _______________.
- I sang stories of _______________ long before I ever met them in person.
- _______________ is often the butt of my jokes.
- I am writing a ballad about the adventures of _______________.
- _______________ trusted me with a secret.
- _______________ does not trust me, and for good reason.
advanced_moves_2_5:
- name: Healing Song
  description: When you heal with arcane art, you heal +1d8 damage.
- name: Vicious Cacophony
  description: When you grant bonus damage with arcane art, you grant an extra +1d4
    damage.
- name: It Goes To Eleven
  description: When you unleash a crazed performance (a righteous lute solo or mighty
    brass blast, maybe) choose a target who can hear you and roll+Cha. ✴On a 10+ the
    target attacks their nearest ally in range. ✴On a 7–9 they attack their nearest
    ally, but you also draw their attention and ire.
- name: Metal Hurlant
  description: 'When you shout with great force or play a shattering note choose a
    target and roll+Con. ✴On a 10+ the target takes 1d10 damage and is deafened for
    a few minutes. ✴On a 7–9 you still damage your target, but it''s out of control:
    the GM will choose an additional target nearby.'
- name: A Little Help From My Friends
  description: When you successfully aid someone you take +1 forward as well.
- name: Eldritch Tones
  description: Your arcane art is strong, allowing you to choose two effects instead
    of one.
- name: Duelist's Parry
  description: When you hack and slash, you take +1 armor forward.
- name: Bamboozle
  description: When you parley with someone, on a 7+ you also take +1 forward with
    them.
- name: Multiclass Dabbler
  description: Get one move from another class. Treat your level as one lower for
    choosing the move.
- name: Multiclass Initiate
  description: Get one move from another class. Treat your level as one lower for
    choosing the move.
  requirement: 'Requires: Multiclass Dabbler'
advanced_moves_6_10:
- name: Healing Chorus
  description: When you heal with arcane art, you heal +2d8 damage.
  requirement: 'Replaces: Healing Song'
- name: Vicious Blast
  description: When you grant bonus damage with arcane art, you grant an extra +2d4
    damage.
  requirement: 'Replaces: Vicious Cacophony'
- name: Unforgettable Face
  description: When you meet someone you've met before (your call) after some time
    apart you take +1 forward against them.
- name: Reputation
  description: When you first meet someone who's heard songs about you, roll+Cha.
    ✴On a 10+, tell the GM two things they've heard about you. ✴On a 7-9, tell the
    GM one thing they've heard, and the GM tells you one thing.
- name: Eldritch Chord
  description: When you use arcane art, you choose two effects. You also get to choose
    one of those effects to double.
  requirement: 'Replaces: Eldritch Tones'
- name: An Ear For Magic
  description: When you hear an enemy cast a spell the GM will tell you the name of
    the spell and its effects. Take +1 forward when acting on the answers.
- name: Devious
  description: When you use charming and open you may also ask "How are you vulnerable
    to me?" Your subject may not ask this question of you.
- name: Duelist's Block
  description: When you hack and slash, you take +2 armor forward.
  requirement: 'Replaces: Duelist''s Parry'
- name: Con
  description: When you parley with someone, on a 7+ you also take +1 forward with
    them and get to ask their player one question which they must answer truthfully.
  requirement: 'Replaces: Bamboozle'
- name: Multiclass Master
  description: Get one move from another class. Treat your level as one lower for
    choosing the move.
  requirement: 'Requires: Multiclass Initiate'
