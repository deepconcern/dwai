description: 'Hirelings are those sorry souls that—for money, glory, or stranger needs—venture
  along with adventurers into the gloom and danger. They are the foolhardy that seek
  to make their name as adventurers. Hirelings serve a few purposes. To the characters,
  they’re the help. They lend their strength to the player characters’ efforts in
  return for their pay. To the players, they’re a resource. They buy the characters
  some extra time against even the most frightening of threats. They’re also replacement
  characters, waiting to step up into the hero’s role when a player character falls.
  To the GM, they’re a human face for the characters to turn to, even in the depths
  of the earth or the far reaches of the planes. Hirelings are not heroes. A hireling
  may become a hero, as a replacement character, but until that time they’re just
  another GM character. As such their exact HP, armor, and damage aren’t particularly
  important. A hireling is defined by their (or Skills) a and a score. A hireling’s
  skill is a special benefit they provide to the players. Most skills are related
  to class abilities, allowing a hireling to fill in for a certain class. If you don’t
  have a ranger but you need to track the assassin’s route out of Torsea anyway, you
  need a Tracker. Each skill has a rank, usually from 1 to 10. The higher the rank
  the more trained the hireling. Generally hirelings only work for adventurers of
  equal or higher level than their highest skill. Skills don’t limit what a hireling
  can do, they just provide mechanics for a certain ability. A hireling with the protector
  skill can still carry your burdens or check for traps, but the outcome isn’t guaranteed
  by a rule. It will fall entirely to the circumstances and the GM. Sending a hireling
  to do something that is clearly beyond their abilities is asking the GM for trouble.
  No hireling works for free. The hireling’s cost is what it takes to keep them with
  the player characters. If the hireling’s cost isn’t paid regularly (usually once
  a session) they’re liable to quit or turn on their employers. When hirelings are
  in play, the players may have to make the Order Hirelings move. The move uses the
  loyalty of the hireling that triggered the move: Hirelings do what you tell them
  to, so long as it isn’t obviously dangerous, degrading, or stupid, and their cost
  is met. roll+loyalty. On a 10+ they stand firm and carry out the order. On a 7–9
  they do it for now, but come back with serious demands later. Meet them or the hireling
  quits on the worst terms.'
making_a_hireling: Hirelings are easy to make on the fly. When someone enters the
  players’ employ note down their name and what cost they’ve agreed to as well as
  any skills they may have. Start with a number based on where the hireling was found.
  Hirelings in villages start with 2–5. Town hirelings get 4–6. Keep hirelings are
  5–8. City hirelings are 6–10. Distribute the hireling’s number between loyalty,
  a main skill, and zero or more secondary skills. Starting loyalty higher than 2
  is unusual, as is starting loyalty below 0. Choose a cost for the hireling and you’re
  done. A hireling’s stats, especially their loyalty, may change during play as a
  reflection of events. A particular kindness or bonus from the players is worth +1
  loyalty forward. Disrespect is -1 loyalty forward. If it’s been a while since their
  cost was last paid they get -1 loyalty ongoing until their cost is met. A hireling’s
  loyalty may be permanently increased when they achieve some great deed with the
  players. A significant failure or beating may permanently lower the hireling’s loyalty.
costs:
- The Thrill of Victory
- Money
- Uncovered Knowledge
- Fame and Glory
- Debauchery
- Good Accomplished
skills:
- name: Adept
  description: An adept has at least apprenticed to an arcane expert, but is not powerful
    in their own right. They’re the grad students of the arcane world.
  abilities:
  - name: Arcane Assistance
    description: When an adept aids in the casting of a spell of lower level than
      their skill, the spell’s effects have greater range, duration, or potency. The
      exact effects depend on the situation and the spell and are up to the GM. The
      GM will describe what effects the assist will add before the spell is cast.
      The most important feature of casting with an adept is that any negative effects
      of the casting are focused on the adept first.
- name: Burglar
  description: Burglars are skilled in a variety of areas, most of them illicit or
    dangerous. They are good with devices and traps, but not too helpful in the field
    of battle.
  abilities:
  - name: Experimental Trap Disarming
    description: When a burglar leads the way they can detect traps almost in time.
      If a trap would be sprung while a burglar is leading the way the burglar suffers
      the full effects but the players get +skill against the trap and add the burglar’s
      skill to their armor against the trap. Most traps leave a burglar in need of
      immediate healing. If the players Make Camp near the trap, the burglar can disarm
      it by the time camp is broken.
- name: Minstrel
  description: When a smiling face is needed to smooth things over or negotiate a
    deal a minstrel is always happy to lend their services for the proper price.
  abilities:
  - name: A Hero’s Welcome
    description: When you enter a place of food, drink, or entertainment with a minstrel
      you will be treated as a friend by everyone present (unless your actions prove
      otherwise). You also subtract the minstrel’s skill from all prices in town.
- name: Priest
  description: Priests are the lower ranking clergy of a religion, performing minor
    offices and regular sacraments. While not granted spells themselves, they are
    able to call upon their deity for minor aid.
  abilities:
  - name: Ministry
    description: When you make camp with a priest if you would normally heal you heal
      +skill HP.
  - name: First Aid
    description: When a priest staunches your wounds heal 2×skill HP. You take -1
      forward as their healing is painful and distracting.
- name: Protector
  description: A protector stands between their employer and the blades, fangs, teeth,
    and spells that would harm them.
  abilities:
  - name: Sentry
    description: When a protector stands between you and an attack you increase your
      armor against that attack by the defender’s skill, then reduce their skill by
      1 until they receive healing or have time to mend.
  - name: Intervene
    description: When a protector helps you defy danger you may opt to take +1 from
      their aid. If you do you cannot get a 10+ result, a 10+ instead counts as a
      7–9.
- name: Tracker
  description: Trackers know the secrets of following a trail, but they don’t have
    the experience with strange creatures and exotic locales that make for a great
    hunter.
  abilities:
  - name: Track
    description: When a tracker is given time to study a trail while Making Camp,
      when camp is broken they can follow the trail to the next major change in terrain,
      travel, or weather.
  - name: Guide
    description: When a tracker leads the way you automatically succeed on any Perilous
      Journey of a distance (in rations) lower than the tracker’s skill.
- name: Warrior
  description: Warriors are not masters of combat, but they are handy with a weapon.
  abilities:
  - name: Man-at-arms
    description: When you deal damage while a warrior aids you add their skill to
      the damage done. If your attack results in consequences (like a counter attack)
      the man-at-arms takes the brunt of it.
