name: Ranger
description: These city-born folk you travel with. Have they heard the call of the
  wolf? Felt the winds howl in the bleak deserts of the East? Have they hunted their
  prey with the bow and the knife like you? Hell no. That's why they need you. Guide.
  Hunter. Creature of the wilds. You are these things and more. Your time in the wilderness
  may have been solitary until now, but the call of some greater thing—call it fate
  if you like—has cast your lot with these folk. Brave, they may be. Powerful and
  strong, too. You know the secrets of the spaces between, though. Without you, they'd
  be lost. Blaze a trail through the blood and dark, strider.
hp_base: 8
damage_die: 8
names:
  elf: [Throndir, Elrosine, Aranwe, Celion, Dambrath, Lanethe]
  human: [Jonah, Halek, Brandon, Emory, Shrike, Nora, Diana]
looks:
  eyes: [Wild Eyes, Sharp Eyes, Animal Eyes]
  hair: [Hooded Head, Wild Hair, Bald]
  clothing: [Cape, Camouflage, Traveling Clothes]
  body: [Lithe Body, Wild Body, Sharp Body]
race_moves:
- name: Elf
  description: When you undertake a perilous journey through wilderness whatever job
    you take you succeed as if you rolled a 10+.
- name: Human
  description: When you make camp in a dungeon or city, you don't need to consume
    a ration.
starting_moves:
- name: Hunt and Track (Wis)
  description: 'When you follow a trail of clues left behind by passing creatures,
    roll+WIS. ✴On a 7+, you follow the creature''s trail until there''s a significant
    change in its direction or mode of travel. ✴On a 10+, you also choose 1:'
  options:
  - Gain a useful bit of information about your quarry, the GM will tell you what
  - Determine what caused the trail to end
- name: Called Shot
  description: When you attack a defenseless or surprised enemy at range, you can
    choose to deal your damage or name your target and roll+DEX.
  options:
  - 'Head ✴10+: As 7–9, plus your damage ✴7-9: They do nothing but stand and drool
    for a few moments.'
  - 'Arms ✴10+: As 7-9, plus your damage ✴7-9: They drop anything they''re holding.'
  - 'Legs ✴10+: As 7-9, plus your damage ✴7-9: They''re hobbled and slow moving.'
- name: Animal Companion
  description: 'You have a supernatural connection with a loyal animal. You can''t
    talk to it per se but it always acts as you wish it to. Name your animal companion
    and choose a species: Wolf, cougar, bear, eagle, dog, hawk, cat, owl, pigeon,
    rat, mule Choose a base: Choose as many strengths as its ferocity: Fast, burly,
    huge, calm, adaptable, quick reflexes, tireless, camouflage, ferocious, intimidating,
    keen senses, stealthy Your animal companion is trained to fight humanoids. Choose
    as many additional trainings as its cunning: Hunt, search, scout, guard, fight
    monsters, perform, labor, travel Choose as many weaknesses as its instinct: Flighty,
    savage, slow, broken, frightening, forgetful, stubborn, lame'
  options:
  - Ferocity +2, Cunning +1, 1 Armor, Instinct +1
  - Ferocity +2, Cunning +2, 0 Armor, Instinct +1
  - Ferocity +1, Cunning +2, 1 Armor, Instinct +1
  - Ferocity +3, Cunning +1, 1 Armor, Instinct +2
- name: Command
  description: When you work with your animal companion on something it's trained in…
  options:
  - …and you attack the same target, add its ferocity to your damage
  - …and you track, add its cunning to your roll
  - …and you take damage, add its armor to your armor
  - …and you discern realities, add its cunning to your roll
  - …and you parley, add its cunning to your roll
  - …and someone interferes with you, add its instinct to their roll
alignments:
- alignment: Chaotic
  description: Free someone from literal or figurative bonds.
- alignment: Good
  description: Endanger yourself to combat an unnatural threat.
- alignment: Neutral
  description: Help an animal or spirit of the wild.
starting_gear:
  load_base: 11
  default:
    - Dungeon rations (5 uses, 1 weight)
    - Leather armor (1 armor, 1 weight)
    - Bundle of arrows (3 ammo, 1 weight)
  options:
  - Hunter's bow (near, far, 1 weight) and short sword (close, 1 weight)
  - Hunter's bow (near, far, 1 weight) and spear (reach, 1 weight)
  - Adventuring gear (1 weight) and dungeon rations (1 weight)
  - Adventuring gear (1 weight) and bundle of arrows (3 ammo, 1 weight)
bonds:
- _______________ smells more like prey than a hunter.
- I will keep _______________ safe from the dangers of the wild.
- I guided _______________ once before; I will guide them again.
- _______________ has tasted the wild; I wonder if they can handle more.
advanced_moves_2_5:
- name: Half-Elven
  description: Somewhere in your lineage lies mixed blood and it begins to show its
    presence. You gain the elf starting move if you took the human one at character
    creation or vice versa.
- name: Wild Empathy
  description: You can speak with and understand animals.
- name: Familiar Prey
  description: When you spout lore about a monster you use WIS instead of INT.
- name: Viper's Strike
  description: When you strike an enemy with two weapons at once, add an extra 1d4
    damage for your off-hand strike.
- name: Camouflage
  description: When you keep still in natural surroundings, enemies never spot you
    until you make a movement.
- name: Man's Best Friend
  description: When you allow your animal companion to take a blow that was meant
    for you, the damage is negated and your animal companion's ferocity becomes 0.
    If its ferocity is already 0 you can't use this ability. When you have a few hours
    of rest with your animal companion its ferocity returns to normal.
- name: Blot Out the Sun
  description: When you volley you may spend extra ammo before rolling. For each point
    of ammo spent you may choose an extra target. Roll once and apply damage to all
    targets.
- name: Well-Trained
  description: Choose another training for your animal companion.
- name: God Amidst the Wastes
  description: Dedicate yourself to a deity (name a new one or choose one that's already
    been established). You gain the commune and cast a spell cleric moves. When you
    select this move, treat yourself as a cleric of level 1 for using spells. Every
    time you gain a level thereafter, increase your effective cleric level by 1.
- name: Follow Me
  description: When you undertake a perilous journey you can take two roles. You make
    a separate roll for each.
- name: A Safe Place
  description: When you set the watch for the night, everyone takes +1 to take watch.
advanced_moves_6_10:
- name: Wild Speech
  description: You can speak with and understand any non-magical, non-planar creature.
  requirement: 'Replaces: Wild Empathy'
- name: Hunter's Prey
  description: When you spout lore about a monster you use WIS instead of INT. On
    a 12+, in addition to the normal effects, you get to ask the GM any one question
    about the subject.
  requirement: 'Replaces: Familiar Prey'
- name: Viper's Fangs
  description: When you strike an enemy with two weapons at once, add an extra 1d8
    damage for your off-hand strike.
  requirement: 'Replaces: Viper''s Strike'
- name: Smaug's Belly
  description: When you know your target's weakest point your arrows have 2 piercing.
- name: Strider
  description: When you undertake a perilous journey you can take two roles. Roll
    twice and use the better result for both roles.
  requirement: 'Replaces: Follow Me'
- name: A Safer Place
  description: When you set the watch for the night everyone takes +1 to take watch.
    After a night in camp when you set the watch everyone takes +1 forward.
  requirement: 'Replaces: A Safe Place'
- name: Observant
  description: When you hunt and track, on a hit you may also ask one question about
    the creature you are tracking from the discern realities list for free.
- name: Special Trick
  description: Choose a move from another class. So long as you are working with your
    animal companion you have access to that move.
- name: Unnatural Ally
  description: Your animal companion is a monster, not an animal. Describe it. Give
    it +2 ferocity and +1 instinct, plus a new training.
