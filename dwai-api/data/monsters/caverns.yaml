name: Cavern Dwellers
monsters:
- name: Ankheg
  tags:
  - Group
  - Large
  hp: 10
  armor: 3
  attack: Bite (d8+1 damage)
  attack_tags:
  - Close
  - Reach
  description: A hide like plate armor and great crushing mandibles are problematic.
    A stomach full of acid that can burn a hole through a stone wall makes them all
    the worse. They’d be bad enough if they were proper insect-sized, but these things
    have the gall to be as long as any given horse. It’s just not natural! Good thing
    they tend to stick to one place? Easy for you to say—you don’t have an ankheg
    living under your corn field.
  instinct: To undermine
  special_qualities:
  - Burrowing
  moves:
  - Undermine the ground
  - Burst from the earth
  - Spray forth acid, eating away at metal and flesh
- name: Cave Rat
  tags:
  - Horde
  - Small
  hp: 7
  armor: 1
  attack: Gnaw (d6 damage 1 piercing)
  attack_tags:
  - Close
  - Messy
  description: Who hasn’t seen a rat before? It’s like that, but nasty and big and
    not afraid of you anymore. Maybe this one was a cousin to that one you caught
    in a trap or the one you killed with a knife in that filthy tavern in Darrow.
    Maybe he’s looking for a little ratty revenge.
  instinct: To devour
  moves:
  - Swarm
  - Rip something (or someone) apart
- name: Choker
  tags:
  - Solitary
  - Stealthy
  - Intelligent
  hp: 15
  armor: 2
  attack: Choke (d10 damage)
  attack_tags:
  - Close
  - Reach
  description: Some say these things descended from the family of a cruel wizard who
    forced them to live out their lives underground. They say his experiments led
    him to fear the sun and ages passed while he descended into unlife, dragging his
    folk along with him. These things resemble men, in a way. Head, four limbs and
    all that. Only their skin is wet and rubbery and their arms long and fingers grasping.
    They hate all life that bears the stink of the sun’s touch, as one might expect.
    Jealousy, long-instilled, is hard to shake.
  instinct: To deny light
  special_qualities:
  - Flexible
  moves:
  - Hold someone, wringing the breath from them
  - Fling a held creature
- name: Cloaker
  tags:
  - Solitary
  - Stealthy
  hp: 12
  armor: 1
  attack: Constrict (d10 damage ignores armor)
  attack_tags:
  - Close
  description: Don’t put on that cloak, Gareth. Don’t. You don’t know where it’s been.
    I tell you, it’s no good. See! It moved! I’m not mad, Gareth, it moved! Don’t
    do it! No! GARETH!
  instinct: To engulf
  special_qualities:
  - Looks like a cloak
  moves:
  - Engulf the unsuspecting
- name: Dwarven Warrior
  tags:
  - Horde
  - Organized
  hp: 7
  armor: 2
  attack: Axe (d6 damage)
  attack_tags:
  - Close
  description: 'For ages, men believed all dwarves were male and all were of this
    ilk: stoic and proud warriors. Axe-wielding and plate-wearing. Stout bearded battle-hungry
    dwarves who would push them, time and time again, back up out of their mines and
    tunnels with ferocity. It just goes to show how little men know about the elder
    races. These folk are merely a vanguard, and they bravely do their duty to protect
    the riches of the Dwarven realm. Earn their trust and you’ve an ally for life.
    Earn their ire and you’re not likely to regret it very long.'
  instinct: To defend
  moves:
  - Drive them back
  - Call up reinforcements
- name: Earth Elemental
  tags:
  - Solitary
  - Huge
  hp: 27
  armor: 4
  attack: Smash (d10+5 damage)
  attack_tags:
  - Reach
  - Forceful
  description: Our shaman says that all the things of the world have a spirit. Stones,
    trees, a stream. Now that I’ve seen the earth roil under my feet and fists of
    stone beat my friends half to death I’d like to believe that crazy old man. The
    one I saw was huge—big as a house! It came boiling up from a rockslide out of
    nowhere and had a voice like an avalanche. I pay my respects, now. Rightly so.
  instinct: To show the strength of earth
  special_qualities:
  - Made of stone
  moves:
  - Turn the ground into a weapon
  - Meld into stone
- name: Fire Beetle
  tags:
  - Horde
  - Small
  hp: 3
  armor: 3
  attack: Flames (d6 damage ignores armor)
  attack_tags:
  - Near
  description: Scarabaeus pyractomena! What a delightful creature—see how its carapace
    glitters in the light of our torches? Not too close now, they’re temperamental,
    you see. The fire in their belly isn’t just metaphorical, no. Watch as I goad
    the beast. Aha! A spout of flame! Unexpected, isn’t it? One of these creatures
    alone, if it comes up from below, can be a hellish nuisance to a farmstead or
    village. A whole swarm? There’s a reason they call it a conflagration of fire
    beetles.
  instinct: To enflame
  special_qualities:
  - Full of flames
  moves:
  - Undermine the ground
  - Burst from the earth
  - Spray forth flames
- name: Gargoyle
  tags:
  - Horde
  - Stealthy
  - Hoarder
  hp: 3
  armor: 2
  attack: Claw (d6 damage)
  attack_tags:
  - Close
  description: It’s a sad thing, really. Guardians bred by magi of the past with no
    more castles to guard. Their ancestors’ sacred task bred into their blood leads
    them to find a place—ruins mostly, but sometimes a cave or hill or mountain cliff—and
    guard it as though their masters yet lived below. They’re notoriously good at
    finding valuables buried below the earth, though. Find one of these winged reptiles
    and you’ll find yourself a treasure nearby. Just be careful, they’re hard to spot
    and tend to move in packs.
  instinct: To guard
  special_qualities:
  - Wings
  moves:
  - Attack with the element of surprise
  - Take to the air
  - Blend into stonework
- name: Gelatinous Cube
  tags:
  - Solitary
  - Large
  - Stealthy
  - Amorphous
  hp: 20
  armor: 1
  attack: Engulf (d10+1 damage ignores armor)
  attack_tags:
  - Hand
  description: How many adventurers’ last thoughts were “strange, this tunnel seems
    cleaner than most?” Too many, and all because of this transparent menace. A great
    acidic blob that expands to fill a small chamber or corridor and then slides,
    ever so slowly along, eating everything in its path. It cannot eat stone or metal
    and will often have them floating in its jelly mass. Blech.
  instinct: To clean
  special_qualities:
  - Transparent
  moves:
  - Fill an apparently empty space
  - Dissolve
- name: Goblin
  tags:
  - Horde
  - Small
  - Intelligent
  - Organized
  hp: 3
  armor: 1
  attack: Spear (d6 damage)
  attack_tags:
  - Close
  - Reach
  description: Nobody seems to know where these things came from. Elves say they’re
    the dwarves’ fault—dredged up from a hidden place beneath the earth. Dwarves say
    they’re bad elvish children, taken away at birth and raised in the dark. The truth
    of the matter is that goblins have always been here and they’ll be here once all
    the civilized races have fallen and gone away. Goblins never die out. There’s
    just too damn many of them.
  instinct: To multiply
  moves:
  - Charge!
  - Call more goblins
  - Retreat and return with (many) more
- name: Goblin Orkaster
  tags:
  - Solitary
  - Small
  - Magical
  - Intelligent
  - Organized
  hp: 12
  armor: 0
  attack: Acid orb (d10+1 damage ignores armor)
  attack_tags:
  - Near
  - Far
  description: Oh lord, who taught them magic?
  instinct: To tap power beyond their stature
  moves:
  - Unleash a poorly understood spell
  - Pour forth magical chaos
  - Use other goblins for shields
- name: Goliath
  tags:
  - Group
  - Huge
  - Organized
  - Intelligent
  hp: 14
  armor: 1
  attack: Mace (d8+7 damage)
  attack_tags:
  - Reach
  - Forceful
  description: They dwell beneath the earth because they do not belong above it any
    longer. An undying race of mighty titans fled the plains and mountains in ages
    past—driven out by men and their heroes. Left to bide their time in the dark,
    hate and anger warmed by the pools of lava deep below. It’s said that an earthquake
    is a goliath’s birthing cry. Someday they’ll take back what’s theirs.
  instinct: To retake
  moves:
  - Shake the earth
  - Retreat, only to come back stronger
- name: Otyugh
  tags:
  - Solitary
  - Large
  hp: 20
  armor: 1
  attack: Tentacles (d10+3 damage)
  attack_tags:
  - Close
  - Reach
  - Forceful
  description: The mating call of the otyugh is a horrible, blaring cry that sounds
    like a cross between an elephant dying and an over-eager vulture. The otyugh spends
    much of its time partly submerged in filthy water and prefers eating garbage over
    any other food. As a result, it often grows fat and strong on the offal of orcs,
    goblins and other cave-dwelling sub-humans. Get too close, however, and you’ll
    have one of its barbed tentacles dragging you into that soggy, razor-toothed maw.
    If you get away with your life, best get to a doctor, or your victory may be short
    lived.
  instinct: To befoul
  special_qualities:
  - Filth Fever
  moves:
  - Infect someone with filth fever
  - Fling someone or something
- name: Maggot-Squid
  tags:
  - Horde
  - Small
  hp: 3
  armor: 1
  attack: Chew (d6 damage)
  attack_tags:
  - Close
  description: The gods that made this thing were playing some sick joke on the civilized
    folk of the world. The maggot-squid wields a face full of horrible squirming tentacles
    that, if they touch you, feel like being struck by lightning. They’ll paralyze
    you and chew you up slowly while you’re helpless. Best to not let it get to that.
  instinct: To eat
  special_qualities:
  - Amphibious
  - Paralyzing Tentacles
  moves:
  - Paralyze with a touch
- name: Purple Worm
  tags:
  - Solitary
  - Huge
  hp: 20
  armor: 2
  attack: Bite (d10+5 damage)
  attack_tags:
  - Reach
  - Forceful
  description: Iä! Iä! The Purple Worm! Blessed is its holy slime! We walk, unworthy,
    in its miles of massive tunnels. We are but shadows under its violet and all-consuming
    glory. Mere acolytes, we who hope someday to return to the great embrace of its
    tooth-ringed maw. Let it consume us! Let it eat our homes and villages so that
    we might be taken! Iä! Iä! The Purple Worm!
  instinct: To consume
  special_qualities:
  - Burrowing
  moves:
  - Swallow whole
  - Tunnel through stone and earth
- name: Roper
  tags:
  - Solitary
  - Large
  - Stealthy
  - Intelligent
  hp: 16
  armor: 1
  attack: Bite (d10+1 damage)
  attack_tags:
  - Close
  - Reach
  description: Evolutionary happenstance has created a clever underground predator.
    Disguised as a rocky formation—most often a stalactite or stalagmite—the roper
    waits for its prey to wander by. When it does, whether it’s a rat, a goblin or
    a foolhardy adventurer, a mass of thin, whipping tentacles erupts from the thing’s
    hide. A hundred lashes in the blink of an eye and the stunned prey is being dragged
    into the roper’s mouth. Surprisingly effective for a thing that looks like a rock.
  instinct: To ambush
  special_qualities:
  - Rock-like Flesh
  moves:
  - Ensnare the unsuspecting
  - Disarm a foe
  - Chew on someone
- name: Rot Grub
  tags:
  - Horde
  - Tiny
  hp: 3
  armor: 0
  attack: Burrow (d6-2 damage)
  attack_tags:
  - Hand
  description: They live in your skin. Or your organ meat. Or your eyeballs. They
    grow there and then, in a bloody and horrific display, burrow their way out. Disgusting.
  instinct: To infect
  special_qualities:
  - Burrow into flesh
  moves:
  - Burrow under flesh
  - Lay eggs
  - Burst forth from an infected creature
- name: Spiderlord
  tags:
  - Solitary
  - Large
  - Devious
  - Intelligent
  hp: 16
  armor: 3
  attack: Mandibles (d8+4 damage)
  attack_tags:
  - Close
  - Reach
  description: Even spiders have their gods, whispered to in webs with little praying
    arms.
  instinct: To weave webs (literal and metaphorical)
  special_qualities:
  - Burrowing
  moves:
  - Enmesh in webbing
  - Put a plot into motion
- name: Troglodyte
  tags:
  - Group
  - Organized
  hp: 10
  armor: 1
  attack: Club (d8 damage)
  attack_tags:
  - Close
  description: Long-forgotten, our last remaining ancestors dwell in caves in the
    wild parts of the world. Driven away by our cities and villages, our iron swords
    and our fire, these ape-men eat their meat raw with sharp-nailed hands and jagged
    teeth. They strike out at frontier villages wielding clubs and in overwhelming
    numbers to seize cattle, tools, and poor prisoners to drag into the hills. Known
    for their viciousness and their stink, they’re an old and dying race we’d all
    sooner forget existed.
  instinct: To prey on civilization
  moves:
  - Raid and retreat
  - Use scavenged weapons or magic
