name: Ranger
description:
  These city-born folk you travel with. Have they heard the call of the
  wolf? Felt the winds howl in the bleak deserts of the East? Have they hunted their
  prey with the bow and the knife like you? Hell no. That's why they need you. Guide.
  Hunter. Creature of the wilds. You are these things and more. Your time in the wilderness
  may have been solitary until now, but the call of some greater thing—call it fate
  if you like—has cast your lot with these folk. Brave, they may be. Powerful and
  strong, too. You know the secrets of the spaces between, though. Without you, they'd
  be lost. Blaze a trail through the blood and dark, strider.
hp_base: 8
damage_die: 8
names:
  elf: [Throndir, Elrosine, Aranwe, Celion, Dambrath, Lanethe]
  human: [Jonah, Halek, Brandon, Emory, Shrike, Nora, Diana]
looks:
  eyes: [Wild Eyes, Sharp Eyes, Animal Eyes]
  hair: [Hooded Head, Wild Hair, Bald]
  clothing: [Cape, Camouflage, Traveling Clothes]
  body: [Lithe Body, Wild Body, Sharp Body]
race_moves:
  - key: elf_ranger
    name: Elf
    type: class
    trigger: When you undertake a perilous journey through wilderness
    description: Whatever job you take you succeed as if you rolled a 10+.
  - key: human_ranger
    name: Human
    type: class
    trigger: When you make camp in a dungeon or city
    description: You don't need to consume a ration.
starting_moves:
  - key: hunt_and_track
    name: Hunt and Track
    type: class
    trigger: When you follow a trail of clues left behind by passing creatures
    roll: WIS
    on_10: You follow the creature's trail until there's a significant change in its direction or mode of travel. Also choose 1.
    on_7_9: You follow the creature's trail until there's a significant change in its direction or mode of travel.
    options:
      - Gain a useful bit of information about your quarry, the GM will tell you what
      - Determine what caused the trail to end
  - key: called_shot
    name: Called Shot
    type: class
    trigger: When you attack a defenseless or surprised enemy at range
    roll: DEX
    on_10: As 7–9, plus your damage.
    on_7_9: Named effect lands.
    description: You can choose to deal your damage instead of rolling. Name your target body part.
    options:
      - "Head: They do nothing but stand and drool for a few moments."
      - "Arms: They drop anything they're holding."
      - "Legs: They're hobbled and slow moving."
  - key: animal_companion
    name: Animal Companion
    type: class
    description:
      You have a supernatural connection with a loyal animal. You can't talk
      to it per se but it always acts as you wish it to. Name your animal companion
      and choose its species, base stats, strengths, trainings, and weaknesses.
    creation_options:
      - label: Base Stats
        pick: 1
        choices:
          - key: base_balanced
            label: Balanced (Ferocity +2, Cunning +1, 1 Armor, Instinct +1)
          - key: base_cunning
            label: Cunning (Ferocity +2, Cunning +2, 0 Armor, Instinct +1)
          - key: base_defensive
            label: Defensive (Ferocity +1, Cunning +2, 1 Armor, Instinct +1)
          - key: base_ferocious
            label: Ferocious (Ferocity +3, Cunning +1, 1 Armor, Instinct +2)
  - key: command
    name: Command
    type: class
    trigger: When you work with your animal companion on something it's trained in
    description: Choose the applicable bonus.
    options:
      - "…and you attack the same target, add its ferocity to your damage"
      - "…and you track, add its cunning to your roll"
      - "…and you take damage, add its armor to your armor"
      - "…and you discern realities, add its cunning to your roll"
      - "…and you parley, add its cunning to your roll"
      - "…and someone interferes with you, add its instinct to their roll"
alignments:
  - alignment: Chaotic
    description: Free someone from literal or figurative bonds.
  - alignment: Good
    description: Endanger yourself to combat an unnatural threat.
  - alignment: Neutral
    description: Help an animal or spirit of the wild.
starting_gear:
  load_base: 11
  default:
    - key: dungeon_rations
      uses: 5
    - leather_armor
    - bundle_of_arrows
  options:
    - pick: 1
      choices:
        - - hunters_bow
          - short_sword
        - - hunters_bow
          - spear
    - pick: 1
      choices:
        - - adventuring_gear
          - key: dungeon_rations
            uses: 5
        - - adventuring_gear
          - bundle_of_arrows
bonds:
  - _______________ smells more like prey than a hunter.
  - I will keep _______________ safe from the dangers of the wild.
  - I guided _______________ once before; I will guide them again.
  - _______________ has tasted the wild; I wonder if they can handle more.
advanced_moves_2_5:
  - key: half_elven
    name: Half-Elven
    type: class
    description:
      Somewhere in your lineage lies mixed blood and it begins to show its
      presence. You gain the elf starting move if you took the human one at character
      creation or vice versa.
  - key: wild_empathy
    name: Wild Empathy
    type: class
    description: You can speak with and understand animals.
  - key: familiar_prey
    name: Familiar Prey
    type: class
    trigger: When you spout lore about a monster
    description: You use WIS instead of INT.
  - key: vipers_strike
    name: Viper's Strike
    type: class
    trigger: When you strike an enemy with two weapons at once
    description: Add an extra 1d4 damage for your off-hand strike.
  - key: camouflage
    name: Camouflage
    type: class
    trigger: When you keep still in natural surroundings
    description: Enemies never spot you until you make a movement.
  - key: mans_best_friend
    name: Man's Best Friend
    type: class
    trigger: When you allow your animal companion to take a blow that was meant for you
    description:
      The damage is negated and your animal companion's ferocity becomes 0.
      If its ferocity is already 0 you can't use this ability. When you have a few
      hours of rest with your animal companion its ferocity returns to normal.
  - key: blot_out_the_sun
    name: Blot Out the Sun
    type: class
    trigger: When you volley
    description:
      You may spend extra ammo before rolling. For each point of ammo spent
      you may choose an extra target. Roll once and apply damage to all targets.
  - key: well_trained
    name: Well-Trained
    type: class
    description: Choose another training for your animal companion.
  - key: god_amidst_the_wastes
    name: God Amidst the Wastes
    type: class
    description:
      Dedicate yourself to a deity (name a new one or choose one that's already
      been established). You gain the commune and cast a spell cleric moves. When you
      select this move, treat yourself as a cleric of level 1 for using spells. Every
      time you gain a level thereafter, increase your effective cleric level by 1.
  - key: follow_me
    name: Follow Me
    type: class
    trigger: When you undertake a perilous journey
    description: You can take two roles. You make a separate roll for each.
  - key: a_safe_place
    name: A Safe Place
    type: class
    trigger: When you set the watch for the night
    description: Everyone takes +1 to take watch.
advanced_moves_6_10:
  - key: wild_speech
    name: Wild Speech
    type: class
    description: You can speak with and understand any non-magical, non-planar creature.
    replaces: wild_empathy
  - key: hunters_prey
    name: Hunter's Prey
    type: class
    trigger: When you spout lore about a monster
    description: You use WIS instead of INT. On a 12+, in addition to the normal effects, you get to ask the GM any one question about the subject.
    replaces: familiar_prey
  - key: vipers_fangs
    name: Viper's Fangs
    type: class
    trigger: When you strike an enemy with two weapons at once
    description: Add an extra 1d8 damage for your off-hand strike.
    replaces: vipers_strike
  - key: smaugs_belly
    name: Smaug's Belly
    type: class
    trigger: When you know your target's weakest point
    description: Your arrows have 2 piercing.
  - key: strider
    name: Strider
    type: class
    trigger: When you undertake a perilous journey
    description: You can take two roles. Roll twice and use the better result for both roles.
    replaces: follow_me
  - key: a_safer_place
    name: A Safer Place
    type: class
    trigger: When you set the watch for the night
    description: Everyone takes +1 to take watch. After a night in camp when you set the watch everyone takes +1 forward.
    replaces: a_safe_place
  - key: observant
    name: Observant
    type: class
    trigger: When you hunt and track on a hit
    description: You may also ask one question about the creature you are tracking from the discern realities list for free.
  - key: special_trick
    name: Special Trick
    type: class
    description: Choose a move from another class. So long as you are working with your animal companion you have access to that move.
  - key: unnatural_ally
    name: Unnatural Ally
    type: class
    description: Your animal companion is a monster, not an animal. Describe it. Give it +2 ferocity and +1 instinct, plus a new training.
