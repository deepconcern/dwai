name: Cleric
description:
  The lands of Dungeon World are a gods-forsaken mess. They're lousy with
  the walking dead, beasts of all sorts, and the vast unnatural spaces between safe
  and temple-blessed civilizations. It is a godless world out there. That's why it
  needs you. Bringing the glory of your god to the heathens isn't just in your nature—it's
  your calling. It falls to you to proselytize with sword and mace and spell. To cleave
  deep into the witless heart of the wilds and plant the seed of divinity there. Some
  say that it is best to keep god close to your heart. You know that's rubbish. God
  lives at the edge of a blade. Show the world who is lord.
hp_base: 8
damage_die: 6
names:
  dwarf: [Durga, Aelfar, Gerda, Rurgosh, Bjorn, Drummond, Helga, Siggrun, Freya]
  human:
    [
      Wesley,
      Brinton,
      Jon,
      Sara,
      Hawthorn,
      Elise,
      Clarke,
      Lenore,
      Piotr,
      Dahlia,
      Carmine,
    ]
looks:
  eyes: [Kind Eyes, Sharp Eyes, Sad Eyes]
  hair: [Tonsure, Strange Hair, Bald]
  clothing: [Flowing Robes, Habit, Common Garb]
  body: [Thin Body, Knobby Body, Flabby Body]
race_moves:
  - key: dwarf_cleric
    name: Dwarf
    type: class
    trigger: When you commune
    description:
      You are one with stone. You are also granted a special version of Words
      of the Unspeaking as a rote which only works on stone.
  - key: human_cleric
    name: Human
    type: class
    description:
      Your faith is diverse. Choose one wizard spell. You can cast and be
      granted that spell as if it was a cleric spell.
starting_moves:
  - key: deity
    name: Deity
    type: class
    description:
      You serve and worship some deity or power which grants you spells. Give
      your god a name (maybe Helferth, Sucellus, Zorica or Krugon the Bleak) and choose
      your deity's domain and one precept of your religion.
    creation_options:
      - group: Domain
        pick: 1
        choices:
          - key: healing_and_restoration
            label: Healing and Restoration
          - key: bloody_conquest
            label: Bloody Conquest
          - key: civilization
            label: Civilization
          - key: knowledge_and_hidden_things
            label: Knowledge and Hidden Things
          - key: the_downtrodden_and_forgotten
            label: The Downtrodden and Forgotten
          - key: what_lies_beneath
            label: What Lies Beneath
      - group: Precept
        pick: 1
        choices:
          - key: petition_suffering
            label: Petition by Suffering
            description: "Your religion preaches the sanctity of suffering, add Petition: Suffering"
          - key: petition_secrets
            label: Petition by Gaining Secrets
            description: "Your religion is cultish and insular, add Petition: Gaining Secrets"
          - key: petition_offering
            label: Petition by Offering
            description: "Your religion has important sacrificial rites, add Petition: Offering"
          - key: petition_personal_victory
            label: Petition by Personal Victory
            description: "Your religion believes in trial by combat, add Petition: Personal Victory"
  - key: divine_guidance
    name: Divine Guidance
    type: class
    trigger: When you petition your deity according to the precept of your religion
    description:
      You are granted some useful knowledge or boon related to your deity's
      domain. The GM will tell you what.
  - key: turn_undead
    name: Turn Undead
    type: class
    trigger: When you hold your holy symbol aloft and call on your deity for protection
    roll: WIS
    on_7_9: So long as you continue to pray and brandish your holy symbol, no undead may come within reach of you.
    on_10:
      As 7-9, and you also momentarily daze intelligent undead and cause mindless
      undead to flee. Aggression breaks the effects and they are able to act as normal.
      Intelligent undead may still find ways to harry you from afar.
  - key: commune
    name: Commune
    type: class
    trigger: When you spend uninterrupted time (an hour or so) in quiet communion with your deity
    description: You perform all of the following.
    options:
      - Lose any spells already granted to you.
      - Are granted new spells of your choice whose total levels don't exceed your own level+1, and none of which is a higher level than your own level.
      - Prepare all of your rotes, which never count against your limit.
  - key: cast_a_spell_cleric
    name: Cast a Spell
    type: class
    trigger: When you unleash a spell granted to you by your deity
    roll: WIS
    on_10: The spell is successfully cast and your deity does not revoke the spell, so you may cast it again.
    on_7_9: The spell is cast, but choose one.
    description: Note that maintaining spells with ongoing effects will sometimes cause a penalty to your roll to cast a spell.
    options:
      - You draw unwelcome attention or put yourself in a spot. The GM will tell you how.
      - Your casting distances you from your deity—take -1 ongoing to cast a spell until the next time you commune.
      - After you cast it, the spell is revoked by your deity. You cannot cast the spell again until you commune and have it granted to you.
alignments:
  - alignment: Good
    description: Endanger yourself to heal another.
  - alignment: Lawful
    description: Endanger yourself following the precepts of your church or god.
  - alignment: Evil
    description: Harm another to prove the superiority of your church or god.
starting_gear:
  load_base: 10
  default:
    - key: dungeon_rations
      uses: 5
    - label: "Symbol of the divine (describe it)"
      weight: 0
  options:
    - pick: 1
      choices:
        - - chainmail
        - - shield
    - pick: 1
      choices:
        - - warhammer
        - - mace
        - - staff
          - bandages
    - pick: 1
      choices:
        - - adventuring_gear
          - key: dungeon_rations
            uses: 5
        - - healing_potion
bonds:
  - _______________ has insulted my deity; I do not trust them.
  - _______________ is a good and faithful person; I trust them implicitly.
  - _______________ is in constant danger, I will keep them safe.
  - I am working on converting _______________ to my faith.
advanced_moves_2_5:
  - key: chosen_one
    name: Chosen One
    type: class
    description: Choose one spell. You are granted that spell as if it was one level lower.
  - key: invigorate
    name: Invigorate
    type: class
    trigger: When you heal someone
    description: They take +2 forward to their damage.
  - key: the_scales_of_life_and_death
    name: The Scales of Life and Death
    type: class
    trigger: When someone takes their last breath in your presence
    description: They take +1 to the roll.
  - key: serenity
    name: Serenity
    type: class
    trigger: When you cast a spell
    description: You ignore the first -1 penalty from ongoing spells.
  - key: first_aid
    name: First Aid
    type: class
    description: Cure Light Wounds is a rote for you, and therefore doesn't count against your limit of granted spells.
  - key: divine_intervention
    name: Divine Intervention
    type: class
    trigger: When you commune
    description:
      You get 1 hold and lose any hold you already had. Spend that hold when
      you or an ally takes damage to call on your deity, they intervene with an
      appropriate manifestation (a sudden gust of wind, a lucky slip, a burst of
      light) and negate the damage.
  - key: penitent
    name: Penitent
    type: class
    trigger: When you take damage and embrace the pain
    description: You may take +1d4 damage (ignoring armor). If you do, take +1 forward to cast a spell.
  - key: empower
    name: Empower
    type: class
    trigger: When you cast a spell on a 10+
    description: You have the option of choosing from the 7–9 list. If you do, you may choose one of these effects as well.
    options:
      - The spell's effects are doubled
      - The spell's targets are doubled
  - key: orison_for_guidance
    name: Orison for Guidance
    type: class
    trigger: When you sacrifice something of value to your deity and pray for guidance
    description: Your deity tells you what it would have you do. If you do it, mark experience.
  - key: divine_protection
    name: Divine Protection
    type: class
    trigger: When you wear no armor or shield
    description: You get 2 armor.
  - key: devoted_healer
    name: Devoted Healer
    type: class
    trigger: When you heal someone else of damage
    description: Add your level to the amount of damage healed.
advanced_moves_6_10:
  - key: anointed
    name: Anointed
    type: class
    description: Choose one spell in addition to the one you picked for chosen one. You are granted that spell as if it was one level lower.
    requires: chosen_one
  - key: apotheosis
    name: Apotheosis
    type: class
    trigger: The first time you spend time in prayer as appropriate to your god after taking this move
    description:
      Choose a feature associated with your deity (rending claws, wings of
      sapphire feathers, an all-seeing third eye, etc.). When you emerge from prayer,
      you permanently gain that physical feature.
  - key: reaper
    name: Reaper
    type: class
    trigger: When you take time after a conflict to dedicate your victory to your deity and deal with the dead
    description: Take +1 forward.
  - key: providence
    name: Providence
    type: class
    description: You ignore the -1 penalty from two spells you maintain.
    replaces: serenity
  - key: greater_first_aid
    name: Greater First Aid
    type: class
    description: Cure Moderate Wounds is a rote for you, and therefore doesn't count against your limit of granted spells.
    requires: first_aid
  - key: divine_invincibility
    name: Divine Invincibility
    type: class
    trigger: When you commune
    description:
      You gain 2 hold and lose any hold you already had. Spend that hold when
      you or an ally takes damage to call on your deity, who intervenes with an
      appropriate manifestation and negates the damage.
    replaces: divine_intervention
  - key: martyr
    name: Martyr
    type: class
    trigger: When you take damage and embrace the pain
    description:
      You may take +1d4 damage (ignoring armor). If you do, take +1 forward
      to cast a spell and add your level to any damage done or healed by the spell.
    replaces: penitent
  - key: divine_armor
    name: Divine Armor
    type: class
    trigger: When you wear no armor or shield
    description: You get 3 armor.
    replaces: divine_protection
  - key: greater_empower
    name: Greater Empower
    type: class
    trigger: When you cast a spell
    description:
      On a 10–11 you have the option of choosing from the 7–9 list. If you
      do, you may choose one of these effects as well. On a 12+ you get to choose
      one of these effects for free.
    replaces: empower
    options:
      - The spell's effects are doubled
      - The spell's targets are doubled
  - key: multiclass_dabbler_cleric
    name: Multiclass Dabbler
    type: class
    description: Get one move from another class. Treat your level as one lower for choosing the move.
